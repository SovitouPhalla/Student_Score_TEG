{% extends "layout.html" %}
{% block title %}Teacher Portal – Select Department{% endblock %}

{% block content %}
<div class="card card-narrow" style="max-width: 480px; margin: 3rem auto;">

  <div class="card-header" style="text-align: center;">
    <div style="font-size: 2.5rem; margin-bottom: .5rem;">🏫</div>
    <h1 style="font-size: 1.5rem; margin: 0;">Teacher Portal</h1>
    <p class="card-subtitle">Select your department to continue to the login page.</p>
  </div>

  <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem;">
    <a href="{{ url_for('teacher_login', dept='en') }}"
       class="btn btn-primary"
       style="width: 100%; text-align: center; padding: 1rem; font-size: 1rem;">
      🇺🇸 &nbsp;English Department
    </a>
    <a href="{{ url_for('teacher_login', dept='cn') }}"
       class="btn btn-secondary"
       style="width: 100%; text-align: center; padding: 1rem; font-size: 1rem;">
      🇨🇳 &nbsp;Chinese Department
    </a>
  </div>

  <p style="text-align: center; margin-top: 1.5rem; font-size: .85rem; color: var(--muted);">
    Parent? <a href="{{ url_for('index') }}">Log in here instead.</a>
  </p>

</div>
{% endblock %}
