{% extends "layout.html" %}

{% block title %}Admin Login — Student Term Report Portal{% endblock %}

{% block content %}
<div class="card card-narrow">
  <div class="card-header">
    <h1>🛡 Admin Login</h1>
    <p class="card-subtitle">Student Affairs &mdash; Restricted Access</p>
  </div>

  <form method="POST" action="{{ url_for('admin_login') }}" autocomplete="off">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username"
             placeholder="Admin username" required autofocus />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="••••••••" required />
    </div>

    <button type="submit" class="btn btn-secondary btn-full">Sign In</button>
  </form>
</div>
{% endblock %}
